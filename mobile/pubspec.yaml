name: klamo_mobile
description: كلامو - تطبيق تعليمي للأطفال
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  go_router: ^14.6.2
  audioplayers: ^6.1.0
  record: ^6.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  video_player: ^2.9.2
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.5
  flutter_edge_tts: ^0.0.2
  fl_chart: ^1.2.0
  speech_to_text: ^7.0.0
  whisper_ggml_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon_app.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/icon_app.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/splash.mp4
    - assets/images/icon_app.png
    - assets/images/worlds/
    - assets/images/activities/
    - assets/images/items/
